<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DataLogger - Iniciar sesion</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background: var(--gray-bg);
    }

    .login-panel {
      width: min(100%, 380px);
      background: var(--white);
      border: 1px solid var(--gray-mid);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.5rem;
    }

    .login-title {
      font-size: 1.35rem;
      color: var(--blue);
      line-height: 1.2;
    }

    .login-subtitle {
      font-size: .88rem;
      color: var(--text-soft);
      margin-top: .2rem;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .login-error {
      display: none;
      padding: .75rem;
      border-radius: 8px;
      background: #fee2e2;
      color: #991b1b;
      font-size: .86rem;
      line-height: 1.4;
    }

    .login-actions {
      display: flex;
      justify-content: flex-end;
      gap: .75rem;
      margin-top: .25rem;
    }

    body.dark .login-panel { background: rgb(26, 30, 42); border-color: rgb(40, 46, 65); }
    body.dark .login-error { background: rgba(255, 90, 90, .12); color: var(--red); }
  </style>
</head>
<body>
  <main class="login-page">
    <section class="login-panel" aria-labelledby="login-title">
      <div class="login-brand">
        <div class="logo-icon">DL</div>
        <div>
          <h1 class="login-title" id="login-title">Iniciar sesion</h1>
          <p class="login-subtitle">Acceso al panel DataLogger</p>
        </div>
      </div>

      <form class="login-form" id="login-form">
        <div class="form-group" style="margin:0;">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" required/>
        </div>

        <div class="form-group" style="margin:0;">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required/>
        </div>

        <div class="login-error" id="login-error"></div>

        <div class="login-actions">
          <button class="btn-primary" type="submit" id="login-submit">Iniciar sesión</button>
        </div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-api.js?v=auth-session-fix"></script>
  <script>
    function destinoPostLogin() {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');

      if (!redirect || redirect.includes('login.html') || redirect.startsWith('//') || /^https?:\/\//i.test(redirect)) {
        return 'index.html';
      }

      return redirect;
    }

    function mostrarErrorLogin(message) {
      const errorBox = document.getElementById('login-error');
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    async function redirigirSiYaHaySesion() {
      const session = await window.obtenerSesionActual();
      if (session) window.location.href = destinoPostLogin();
    }

    document.getElementById('login-form').addEventListener('submit', async event => {
      event.preventDefault();

      const submit = document.getElementById('login-submit');
      const errorBox = document.getElementById('login-error');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errorBox.style.display = 'none';
      submit.disabled = true;
      submit.textContent = 'Ingresando...';

      try {
        const { error } = await window.iniciarSesion(email, password);

        if (error) {
          mostrarErrorLogin(error.message || 'No se pudo iniciar sesion.');
          return;
        }

        window.location.href = destinoPostLogin();
      } catch (error) {
        mostrarErrorLogin(error.message || 'No se pudo iniciar sesion.');
      } finally {
        submit.disabled = false;
        submit.textContent = 'Iniciar sesión';
      }
    });

    redirigirSiYaHaySesion().catch(error => {
      mostrarErrorLogin(error.message || 'No se pudo verificar la sesion.');
    });
  </script>
</body>
</html>
